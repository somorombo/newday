<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CYBER-NET SOHBET ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff0055;
            --neon-green: #39ff14;
            --bg-dark: #05050a;
            --bg-card: #0d0d1a;
            --border-neon: 1px solid #00f0ff44;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Share Tech Mono', monospace; }
        body {
            background-color: var(--bg-dark); color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 6px 100%;
        }

        .login-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 10, 0.95); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .login-box { background: var(--bg-card); border: 2px solid var(--neon-pink); padding: 40px; text-align: center; box-shadow: 0 0 20px #ff005533; max-width: 400px; width: 90%; }
        .cyber-grid { display: none; grid-template-columns: 300px 1fr; width: 95vw; height: 90vh; background: var(--bg-card); border: 2px solid var(--neon-cyan); box-shadow: 0 0 20px #00f0ff33; border-radius: 4px; }
        .cyber-sidebar { border-right: 2px solid var(--neon-cyan); display: flex; flex-direction: column; background: #080812; padding: 20px; }
        .cyber-logo { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; text-align: center; color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); margin-bottom: 25px; letter-spacing: 2px; }
        .group-creator { background: #121225; border: var(--border-neon); padding: 10px; margin-bottom: 20px; }
        .group-creator input, .login-box input { width: 100%; background: #05050a; border: 1px solid var(--neon-pink); color: #fff; padding: 10px; margin-bottom: 15px; outline: none; font-size: 1rem; }
        
        .cyber-btn { width: 100%; background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .cyber-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        .section-title { color: var(--neon-pink); font-size: 1.1rem; margin-bottom: 10px; text-transform: uppercase; }
        .room-list { flex: 1; overflow-y: auto; }
        .room-item { padding: 12px; border: var(--border-neon); margin-bottom: 10px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; background: #0a0a16; }
        .room-item:hover, .room-item.active { border-color: var(--neon-pink); box-shadow: 0 0 10px #ff005533; background: #140b15; }
        
        .cyber-chat-area { display: flex; flex-direction: column; background: #05050a; }
        .chat-terminal-header { padding: 15px 20px; border-bottom: 2px solid var(--neon-cyan); display: flex; justify-content: space-between; align-items: center; background: #080812; }
        .active-room-title { font-family: 'Orbitron', sans-serif; color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); }
        .terminal-screen { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .cyber-msg { display: flex; flex-direction: column; max-width: 80%; }
        .msg-meta { font-size: 0.8rem; color: var(--neon-cyan); margin-bottom: 4px; }
        .msg-text { background: #0d0d1a; border-left: 3px solid var(--neon-green); padding: 10px 15px; line-height: 1.5; color: #e0e0ff; }
        .msg-image { max-width: 300px; max-height: 300px; border: 2px solid var(--neon-pink); margin-top: 8px; display: block; box-shadow: 0 0 10px rgba(255, 0, 85, 0.3); }
        
        .terminal-input-bar { border-top: 2px solid var(--neon-cyan); padding: 15px 20px; display: flex; gap: 15px; background: #080812; align-items: center; }
        .terminal-prompt { color: var(--neon-green); font-weight: bold; font-size: 1.2rem; }
        .terminal-input-bar input[type="text"] { flex: 1; background: transparent; border: none; outline: none; color: var(--neon-green); font-size: 1.1rem; }
        .file-upload-label { color: var(--neon-pink); cursor: pointer; font-size: 1.3rem; transition: 0.2s; }
        .file-upload-label:hover { text-shadow: 0 0 10px var(--neon-pink); }
    </style>
</head>
<body>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2 class="cyber-logo" style="margin-bottom: 20px;">// SİBER_AĞA_BAĞLAN</h2>
            <input type="text" id="nicknameInput" placeholder="Sistem Kimliği (Rumuz)..." onkeypress="if(event.key === 'Enter') enterNetwork()">
            <button class="cyber-btn" onclick="enterNetwork()">BAĞLANTIYI BAŞLAT ⚡</button>
        </div>
    </div>

    <div class="cyber-grid" id="mainGrid">
        <div class="cyber-sidebar">
            <div class="cyber-logo">// TIKDIYE_NET</div>
            <div class="section-title">> GRUP_OLUSTUR</div>
            <div class="group-creator">
                <input type="text" id="newRoomName" placeholder="Grup ismi girin...">
                <button class="cyber-btn" onclick="createNewRoom()">⚡ ODALARA EKLE</button>
            </div>
            <div class="section-title">> SEKTORLER (GRUPLAR)</div>
            <div class="room-list" id="roomList"></div>
        </div>

        <div class="cyber-chat-area">
            <div class="chat-terminal-header">
                <div class="active-room-title" id="activeRoomTitle">AKTIF_SEKTOR: YÜKLENİYOR...</div>
                <div style="color: var(--neon-pink)" id="connStatus">[ BAĞLANTI: PASİF ]</div>
            </div>
            <div class="terminal-screen" id="terminalScreen"></div>
            <div class="terminal-input-bar">
                <span class="terminal-prompt" id="promptSpan">user@cyber:~#</span>
                <input type="text" id="msgInput" placeholder="Mesaj verisi yazın..." onkeypress="if(event.key === 'Enter') sendCyberMessage()">
                <label for="imageLoader" class="file-upload-label" title="Fotoğraf Yükle"><i class="fa-solid fa-file-medical"></i></label>
                <input type="file" id="imageLoader" accept="image/*" style="display: none;" onchange="sendCyberImage(event)">
                <i class="fa-solid fa-terminal" style="color: var(--neon-cyan); cursor: pointer; font-size: 1.2rem;" onclick="sendCyberMessage()"></i>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Senin Yeni Veri Tabanı Bilgilerin Tamamen Dolduruldu 🚀
        const firebaseConfig = {
            apiKey: "AIzaSyA23OvrMxgJh3LQdNKufx_mAZ6ySDL0q7Y",
            authDomain: "newday-c3e99.firebaseapp.com",
            databaseURL: "https://newday-c3e99-default-rtdb.firebaseio.com",
            projectId: "newday-c3e99",
            storageBucket: "newday-c3e99.firebasestorage.app",
            messagingSenderId: "53077741823",
            appId: "1:53077741823:web:40eb894e553e6d97397cca"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myNickname = "";
        let currentRoom = "GENEL_LOBI";
        let messageListeners = {};

        window.enterNetwork = function() {
            const input = document.getElementById('nicknameInput');
            const nick = input.value.trim().toUpperCase();
            if(!nick) { alert("Geçersiz Kimlik!"); return; }
            
            myNickname = nick;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainGrid').style.display = 'grid';
            document.getElementById('promptSpan').innerText = `${myNickname.toLowerCase()}@cyber:~#`;
            document.getElementById('connStatus').innerText = "[ BAĞLANTI: AKTIF ]";
            document.getElementById('connStatus').style.color = "var(--neon-green)";
            setupRooms();
        }

        function setupRooms() {
            const defaultRooms = ["GENEL_LOBI", "YAZILIM_EKIBI", "SİBER_MEYDAN"];
            const roomListDiv = document.getElementById('roomList');
            roomListDiv.innerHTML = "";
            defaultRooms.forEach((room, index) => {
                const item = document.createElement('div');
                item.className = `room-item ${index === 0 ? 'active' : ''}`;
                item.id = `room-${room}`;
                item.onclick = () => switchRoom(room);
                item.innerHTML = `<span># ${room}</span><i class="fa-solid fa-layer-group"></i>`;
                roomListDiv.appendChild(item);
            });
            switchRoom("GENEL_LOBI");
        }

        window.createNewRoom = function() {
            const input = document.getElementById('newRoomName');
            const roomName = input.value.trim().toUpperCase().replace(/ /g, "_");
            if(!roomName) return;
            const roomListDiv = document.getElementById('roomList');
            if(!document.getElementById(`room-${roomName}`)) {
                const item = document.createElement('div');
                item.className = 'room-item';
                item.id = `room-${roomName}`;
                item.onclick = () => switchRoom(roomName);
                item.innerHTML = `<span># ${roomName}</span><i class="fa-solid fa-users-viewfinder"></i>`;
                roomListDiv.appendChild(item);
            }
            input.value = '';
            switchRoom(roomName);
        }

        function switchRoom(roomName) {
            currentRoom = roomName;
            document.getElementById('activeRoomTitle').innerText = `AKTIF_SEKTOR: ${roomName}`;
            document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.getElementById(`room-${roomName}`);
            if(activeItem) activeItem.classList.add('active');

            const screen = document.getElementById('terminalScreen');
            screen.innerHTML = `<div class="cyber-msg"><div class="msg-meta">[SYSTEM]</div><div class="msg-text" style="border-left-color: var(--neon-pink)">#${roomName} kanalına güvenli bağlantı kuruldu.</div></div>`;

            if (!messageListeners[roomName]) {
                const roomRef = ref(db, `rooms/${roomName}`);
                onChildAdded(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    if (currentRoom === roomName) { displayMessage(data); }
                });
                messageListeners[roomName] = true;
            }
        }

        function displayMessage(data) {
            const screen = document.getElementById('terminalScreen');
            const isMe = data.sender === myNickname;
            let content = data.type === "text" ? `<div class="msg-text">${data.message}</div>` : `<div class="msg-text" style="border-left-color: var(--neon-pink)"><div>[GÖRSEL_VERİ]</div><img src="${data.message}" class="msg-image"></div>`;
            const msgHtml = `<div class="cyber-msg" style="${isMe ? 'align-self: flex-end;' : 'align-self: flex-start;'}"><div class="msg-meta">[${data.sender}] - ${data.time}</div>${content}</div>`;
            screen.innerHTML += msgHtml;
            screen.scrollTop = screen.scrollHeight;
        }

        window.sendCyberMessage = function() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            set(push(ref(db, `rooms/${currentRoom}`)), { sender: myNickname, message: text, time: timeStr, type: "text" });
            input.value = '';
        }

        window.sendCyberImage = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                set(push(ref(db, `rooms/${currentRoom}`)), { sender: myNickname, message: e.target.result, time: timeStr, type: "image" });
            }
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
