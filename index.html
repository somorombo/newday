<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tıkdiye Sohbet Sitesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0b141a;
            --bg-sidebar: #111b21;
            --bg-chat: #0b141a;
            --bg-panel: #202c33;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --wa-green: #00a884;
            --wa-green-hover: #008f72;
            --bubble-out: #005c4b;
            --bubble-in: #202c33;
            --border-color: #222e35;
            --input-bg: #2a3942;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0c1317; height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text-primary); overflow: hidden; }

        /* AUTH SCREEN */
        .auth-container { background-color: var(--bg-sidebar); padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid var(--wa-green); }
        .auth-container i.fa-comments { font-size: 3rem; color: var(--wa-green); margin-bottom: 15px; }
        .auth-container h2 { margin-bottom: 25px; font-weight: 600; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 1rem; outline: none; }
        .input-group input:focus { border-color: var(--wa-green); }
        .auth-btn { width: 100%; padding: 12px; background-color: var(--wa-green); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .auth-btn:hover { background-color: var(--wa-green-hover); }
        .auth-toggle { margin-top: 20px; font-size: 0.9rem; color: var(--text-secondary); }
        .auth-toggle span { color: var(--wa-green); cursor: pointer; font-weight: 600; }

        /* MAIN APP */
        .app-container { display: none; width: 100vw; height: 100vh; grid-template-columns: 30% 70%; }
        .sidebar { background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { background-color: var(--bg-panel); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .user-avatar { width: 40px; height: 40px; background-color: var(--wa-green); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.1rem; }
        .header-icons { color: var(--text-secondary); display: flex; gap: 20px; font-size: 1.2rem; }
        .header-icons i { cursor: pointer; }
        .header-icons i:hover { color: var(--text-primary); }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 12px 16px; align-items: center; gap: 15px; cursor: pointer; background-color: var(--bg-panel); border-bottom: 1px solid var(--border-color); }
        .chat-info { flex: 1; }
        .chat-info-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .chat-name { font-weight: 600; }
        
        /* CHAT AREA */
        .chat-area { background-color: var(--bg-chat); background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: rgba(11, 20, 26, 0.95); display: flex; flex-direction: column; }
        .chat-header { background-color: var(--bg-panel); height: 60px; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-left: 1px solid var(--border-color); }
        .messages-container { flex: 1; padding: 20px 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 60%; padding: 8px 12px; border-radius: 8px; font-size: 0.95rem; position: relative; display: flex; flex-direction: column; }
        .message.sent { background-color: var(--bubble-out); align-self: flex-end; border-top-right-radius: 0; }
        .message.received { background-color: var(--bubble-in); align-self: flex-start; border-top-left-radius: 0; }
        .message-user { font-size: 0.75rem; color: #ffeb3b; font-weight: bold; margin-bottom: 2px; }
        .message-time { font-size: 0.7rem; color: rgba(255, 255, 255, 0.5); align-self: flex-end; margin-top: 4px; }
        .chat-footer { background-color: var(--bg-panel); padding: 10px 16px; display: flex; align-items: center; gap: 15px; }
        .chat-footer input { flex: 1; background-color: var(--input-bg); border: none; outline: none; border-radius: 8px; padding: 10px 15px; color: var(--text-primary); font-size: 1rem; }
    </style>
</head>
<body>

    <div class="auth-container" id="authScreen">
        <i class="fa-solid fa-comments"></i>
        <h2 id="authTitle">Tıkdiye'ye Giriş Yap</h2>
        <div class="input-group">
            <label>Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="Kullanıcı adınız">
        </div>
        <div class="input-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="Şifreniz">
        </div>
        <button class="auth-btn" id="authBtn" onclick="handleAuth()">Giriş Yap</button>
        <div class="auth-toggle">
            <p id="toggleText">Hesabınız yok mu? <span onclick="toggleAuthMode()">Kayıt Ol</span></p>
        </div>
    </div>

    <div class="app-container" id="appScreen">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-avatar" id="currentUserAvatar">?</div>
                <div class="header-icons">
                    <i class="fa-solid fa-right-from-bracket" title="Çıkış Yap" onclick="logout()"></i>
                </div>
            </div>
            <div class="chat-list">
                <div class="chat-item">
                    <div class="user-avatar" style="background-color: #00a884;">T</div>
                    <div class="chat-info">
                        <div class="chat-info-top"><span class="chat-name">Genel Sohbet Odası 🌍</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div class="user-avatar" style="background-color: #00a884;">T</div>
                    <div>
                        <div class="chat-name">Genel Sohbet Odası 🌍</div>
                    </div>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="chat-footer">
                <i class="fa-regular fa-face-smile"></i>
                <input type="text" id="messageInput" placeholder="Bir mesaj yazın" autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()">
                <i class="fa-solid fa-paper-plane" style="color:var(--wa-green); cursor:pointer;" onclick="sendMessage()"></i>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Senin Firebase Ayarların Buraya Entegre Edildi 🚀
        const firebaseConfig = {
            apiKey: "AIzaSyAhVFitLgjwGVRQVq0HyW9nZRtAt--lPFI",
            authDomain: "newday-4df55.firebaseapp.com",
            databaseURL: "https://newday-4df55-default-rtdb.firebaseio.com",
            projectId: "newday-4df55",
            storageBucket: "newday-4df55.firebasestorage.app",
            messagingSenderId: "19822036076",
            appId: "1:19822036076:web:bd7f62fcb93504dc310449"
        };

        // Firebase Başlat
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isLoginMode = true;
        let currentUser = sessionStorage.getItem('currentUser') || null;

        window.onload = function() {
            if (currentUser) { showApp(currentUser); listenMessages(); }
        }

        window.toggleAuthMode = function() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "Tıkdiye'ye Giriş Yap" : "Yeni Hesap Oluştur";
            document.getElementById('authBtn').innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
            document.getElementById('toggleText').innerHTML = isLoginMode ? `Hesabınız yok mu? <span onclick="toggleAuthMode()">Kayıt Ol</span>` : `Zaten hesabınız var mı? <span onclick="toggleAuthMode()">Giriş Yap</span>`;
        }

        window.handleAuth = function() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) { alert("Boş alan bırakmayın!"); return; }

            const dbRef = ref(db);
            if (isLoginMode) {
                get(child(dbRef, `users/${user}`)).then((snapshot) => {
                    if (snapshot.exists() && snapshot.val().password === pass) {
                        sessionStorage.setItem('currentUser', user);
                        currentUser = user;
                        showApp(user);
                        listenMessages();
                    } else { alert("Hatalı kullanıcı adı veya şifre!"); }
                });
            } else {
                get(child(dbRef, `users/${user}`)).then((snapshot) => {
                    if (snapshot.exists()) { alert("Bu kullanıcı adı zaten alınmış!"); } 
                    else {
                        set(ref(db, 'users/' + user), { password: pass }).then(() => {
                            alert("Kayıt başarılı! Giriş yapabilirsiniz.");
                            toggleAuthMode();
                        });
                    }
                });
            }
        }

        function showApp(username) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'grid';
            document.getElementById('currentUserAvatar').innerText = username.charAt(0).toUpperCase();
        }

        window.logout = function() {
            sessionStorage.removeItem('currentUser');
            location.reload();
        }

        window.sendMessage = function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

            const messagesRef = ref(db, 'messages');
            const newMsgRef = push(messagesRef);
            set(newMsgRef, {
                sender: currentUser,
                message: text,
                time: timeStr
            });
            input.value = '';
        }

        function listenMessages() {
            const messagesRef = ref(db, 'messages');
            const container = document.getElementById('messagesContainer');
            
            onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val();
                const isMe = data.sender === currentUser;
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
                
                msgDiv.innerHTML = `
                    ${!isMe ? `<span class="message-user">${data.sender}</span>` : ''}
                    ${data.message}
                    <span class="message-time">${data.time}</span>
                `;
                
                container.appendChild(msgDiv);
                container.scrollTop = container.scrollHeight;
            });
        }
    </script>
</body>
</html>
