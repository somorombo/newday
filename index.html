<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Sohbet</title>
    <link href="https://fonts.googleapis.com/css2?family=GG+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Tamamen Discord Renk Paleti 🎨 */
            --dc-bg-main: #313338;
            --dc-bg-sidebar: #2b2d31;
            --dc-bg-server: #1e1f22;
            --dc-bg-input: #383a40;
            --dc-bg-login: #1e1f22;
            --dc-text-normal: #dbdee1;
            --dc-text-muted: #949ba4;
            --dc-brand: #5865f2;
            --dc-brand-hover: #4752c4;
            --dc-green: #23a55a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'GG Sans', sans-serif; }
        body { background-color: var(--dc-bg-main); color: var(--dc-text-normal); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* YENİ DISCORD GİRİŞ EKRANI 🔵 */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #5865f2; background-image: url('https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; z-index: 999; }
        .login-box { background: var(--dc-bg-login); padding: 32px; border-radius: 8px; text-align: center; max-width: 480px; width: 90%; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .login-box h2 { color: #fff; font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
        .login-box p { color: var(--dc-text-muted); font-size: 0.95rem; margin-bottom: 20px; }
        .login-box label { display: block; text-align: left; color: var(--dc-text-muted); text-transform: uppercase; font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
        .login-box input { width: 100%; background: #1e1f22; border: 1px solid #111; border-radius: 4px; color: #fff; padding: 10px; margin-bottom: 20px; outline: none; font-size: 1rem; transition: 0.2s; }
        .login-box input:focus { border-color: var(--dc-brand); }
        .login-btn { width: 100%; background: var(--dc-brand); border: none; border-radius: 4px; color: #fff; padding: 12px; cursor: pointer; font-weight: 500; font-size: 1rem; transition: 0.2s; }
        .login-btn:hover { background: var(--dc-brand-hover); }

        /* ANA EKRAN DÜZENİ */
        .cyber-grid { display: none; grid-template-columns: 240px 1fr; width: 100vw; height: 100vh; }
        
        /* SOL MENÜ (KANALLAR) */
        .cyber-sidebar { background: var(--dc-bg-sidebar); display: flex; flex-direction: column; height: 100vh; border-top-left-radius: 8px; }
        .cyber-logo { height: 48px; border-bottom: 1px solid rgba(0,0,0,0.2); display: flex; align-items: center; padding: 0 16px; font-weight: 700; color: #fff; font-size: 0.95rem; }
        .group-creator { padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .group-creator input { width: 100%; background: var(--dc-bg-server); border: none; border-radius: 4px; color: #fff; padding: 8px; margin-bottom: 8px; outline: none; font-size: 0.85rem; }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px; }
        .section-title { color: var(--dc-text-muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px 8px; display: flex; justify-content: space-between; align-items: center; }
        
        .room-item { padding: 8px 12px; border-radius: 4px; margin-bottom: 20px; cursor: pointer; transition: 0.1s; display: flex; align-items: center; gap: 8px; color: var(--dc-text-muted); font-weight: 500; font-size: 0.95rem; }
        .room-item i { font-size: 1.1rem; color: var(--dc-text-muted); }
        .room-item:hover { background: rgba(79,84,92,0.16); color: var(--dc-text-normal); }
        .room-item.active { background: rgba(79,84,92,0.24); color: #fff; }
        .room-item.active i { color: #fff; }
        
        /* SAĞ TARAF (SOHBET ALANI) */
        .cyber-chat-area { display: flex; flex-direction: column; background: var(--dc-bg-main); height: 100vh; position: relative; }
        .chat-terminal-header { height: 48px; border-bottom: 1px solid rgba(0,0,0,0.2); display: flex; align-items: center; padding: 0 16px; background: var(--dc-bg-main); box-shadow: 0 1px 2px rgba(0,0,0,0.1); gap: 8px; }
        .chat-terminal-header i { color: var(--dc-text-muted); font-size: 1.2rem; }
        .active-room-title { color: #fff; font-weight: 600; font-size: 0.95rem; }
